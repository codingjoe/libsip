site_name: Python VoIP
repo_url: https://github.com/codingjoe/VoIP
watch:
  - docs
  - voip
nav:
  - Usage:
      - Quickstart: index.md
      - MCP Server: mcp.md
      - Cookbook: cookbook.md
      - Sessions: sessions.md
      - SIP: sip.md
      - Codecs: codecs.md
  - Features:
      - Feature Roadmap: feature_roadmap.md
      - Contributing: contributing.md
      - RFC Implementation Status: rfc_status.md
  - Changelog: https://github.com/codingjoe/VoIP/releases
  - Community Support: https://github.com/codingjoe/VoIP/discussions
plugins:
  - autorefs:
      resolve_closest: true
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          load_external_modules: true
          options:
            docstring_style: google
            show_root_heading: true
            heading_level: 3
          inventories:
            - https://docs.python.org/3/objects.inv
            - https://numpy.org/doc/stable/objects.inv
            - https://pyav.org/docs/stable/objects.inv
theme:
  name: material
  logo: images/icon.svg
  palette:
    - media: "(prefers-color-scheme)"
      primary: yellow
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      primary: yellow
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      primary: yellow
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - content.code.select
    - content.code.copy
    - navigation.tabs
    - search.suggest
    - search.share
markdown_extensions:
  - github-callouts
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.superfences
